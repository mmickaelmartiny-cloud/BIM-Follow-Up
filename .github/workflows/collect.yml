name: BIM Daily Data Collection

on:
  schedule:
    # Tous les jours a 8h03 UTC
    - cron: '3 8 * * *'
  workflow_dispatch: # Permet de lancer manuellement

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run collection script
        run: node collect.js

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/kpi-history.json
          git diff --staged --quiet || git commit -m "data: collecte KPI du $(date +%Y-%m-%d)"
          git push
